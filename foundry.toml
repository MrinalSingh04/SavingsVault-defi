[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "paris"
optimizer = true
optimizer_runs = 200

# RPC endpoints - Replace with your actual Infura key
[rpc_endpoints]
sepolia = "https://sepolia.infura.io/v3/RPC_URL"

# Etherscan verification - Replace with your actual Etherscan key
[etherscan]
sepolia = { key = "ETHERSCAN_PVT_KEY" }
